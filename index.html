<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Kala — Coming Soon</title>
    
    <!-- Google Fonts: Playfair Display (Serif) & Great Vibes (Script) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* --- COLOR PALETTE (EXACT FROM IMAGE) --- */
        :root {
            --deep-burgundy: #2D0A12; 
            --warm-cream: #F1E3CE;
            --muted-rose: #8C6A6A;
            --dark-gold: #DAC3B0;
            --cream-soft: #FDF8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--deep-burgundy);
            color: var(--warm-cream);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle background texture/glow */
        body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(140, 106, 106, 0.2) 0%, transparent 70%);
            z-index: 0;
            border-radius: 50%;
            animation: breathe 6s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* --- CENTER CONTAINER --- */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 700px;
            padding: 20px;
            width: 100%;
        }

        /* --- THE EAST KALA LOGO CSS REPLICATION --- */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 40px;
        }

        .logo-text-east {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 4.5rem;
            color: var(--warm-cream);
            letter-spacing: 0px;
            display: inline-block;
            vertical-align: middle;
            margin-right: -5px;
        }

        .logo-text-kala {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: var(--warm-cream);
            display: inline-block;
            vertical-align: middle;
            margin-left: -5px;
            transform: rotate(-4deg); 
            margin-top: 5px;
        }

        /* Floral motif styling (Trying to recreate the beautiful rose) */
        .floral-divider {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 80px;
            margin-top: -15px;
        }

        .flower-crest {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: transparent;
        }

        /* Stylized Rose using SVGs and CSS */
        .rose-icon {
            position: relative;
            width: 50px;
            height: 50px;
            animation: subtleSway 4s ease-in-out infinite;
        }

        .rose-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .rose-petal {
            fill: var(--muted-rose);
            stroke: rgb(80, 50, 50);
            stroke-width: 0.5;
        }

        .rose-center {
            fill: var(--dark-gold);
        }

        .line-stem {
            position: absolute;
            width: 150px;
            height: 1px;
            background: var(--dark-gold);
            opacity: 0.4;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .line-stem.left { right: 100%; margin-right: 20px; }
        .line-stem.right { left: 100%; margin-left: 20px; }

        @keyframes subtleSway {
            0% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
            100% { transform: rotate(-2deg); }
        }

        /* --- LAUNCH CONTENT --- */
        h2.main-title {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 2.8rem;
            margin-bottom: 15px;
        }

        h2.main-title span {
            font-family: 'Great Vibes', cursive;
            color: var(--dark-gold);
            font-size: 3.5rem;
        }

        p.description {
            font-weight: 300;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: rgba(241, 227, 206, 0.8);
            max-width: 500px;
            margin: 0 auto 40px auto;
            line-height: 1.8;
        }

        /* --- EMAIL FORM --- */
        .notify-form {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 480px;
            margin: 0 auto;
        }

        .notify-form input {
            flex: 1;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(241, 227, 206, 0.25);
            color: var(--warm-cream);
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            outline: none;
            min-width: 220px;
            transition: 0.3s ease;
        }

        .notify-form input:focus {
            border-color: var(--dark-gold);
            background: rgba(255, 255, 255, 0.1);
        }

        .notify-form input::placeholder {
            color: rgba(241, 227, 206, 0.4);
        }

        .notify-form button {
            background-color: var(--warm-cream);
            color: var(--deep-burgundy);
            border: none;
            padding: 16px 32px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s ease;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .notify-form button:hover {
            background-color: var(--cream-soft);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .form-message {
            margin-top: 15px;
            font-weight: 300;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* --- SMALL FOOTER TEXT --- */
        .footer-note {
            margin-top: 50px;
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(241, 227, 206, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .logo-text-east { font-size: 3.2rem; }
            .logo-text-kala { font-size: 3.6rem; }
            
            .line-stem { display: none; } /* Hide lines on small screens */
            
            h2.main-title { font-size: 2rem; }
            h2.main-title span { font-size: 2.8rem; }
            
            .notify-form {
                flex-direction: column;
                align-items: center;
                width: 100%;
            }
            .notify-form input {
                width: 100%;
                min-width: auto;
            }
            .notify-form button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- THE LOGO -->
        <div class="logo-wrapper">
            <div>
                <span class="logo-text-east">East</span>
                <span class="logo-text-kala">Kala</span>
            </div>
            
            <!-- Recreating the floral motif from your image -->
            <div class="floral-divider">
                <div class="flower-crest">
                    <div class="rose-icon">
                        <!-- SVG Graphic mimicking the flower in your logo -->
                        <svg class="rose-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <!-- Petals -->
                            <path class="rose-petal" d="M50,10 C40,30 20,40 10,60 C30,70 50,80 50,90 C50,80 70,70 90,60 C80,40 60,30 50,10 Z" opacity="0.9"/>
                            <path class="rose-petal" d="M50,20 C20,30 15,50 10,70 C30,60 50,80 50,90 C50,80 70,60 90,70 C85,50 80,30 50,20 Z" opacity="0.7" transform="rotate(30, 50, 50)"/>
                            <path class="rose-petal" d="M50,10 C30,20 20,40 15,60 C35,50 50,70 50,90 C50,70 65,50 85,60 C80,40 70,20 50,10 Z" opacity="0.8" transform="rotate(-30, 50, 50)"/>
                            <!-- Center -->
                            <ellipse class="rose-center" cx="50" cy="60" rx="10" ry="15" transform="rotate(-15, 50, 60)"/>
                            <!-- Leaves -->
                            <path d="M10,75 C30,70 25,50 30,30" stroke="#5c4033" stroke-width="2" fill="none"/>
                            <path d="M20,55 C35,50 45,60 50,70" stroke="#5c4033" stroke-width="2" fill="none"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- COMING SOON TEXT -->
        <h2 class="main-title">
            Something Beautiful is <br><span>Blooming</span>
        </h2>
        <p class="description">
            Artistry, heritage, and elegance converge. We are preparing a collection that tells stories of timeless craft.
        </p>

        <!-- EMAIL SIGNUP FORM -->
        <form class="notify-form" id="subscribeForm">
            <input type="email" id="emailInput" placeholder="Enter your email address" required>
            <button type="submit">Notify Me</button>
        </form>
        <div id="feedbackMessage" class="form-message"></div>

        <div class="footer-note">
            ✦ East Kala · Where Art Finds Home ✦
        </div>
    </div>

    <script>
        document.getElementById('subscribeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const messageDiv = document.getElementById('feedbackMessage');

            // Basic email validation
            if(email && email.includes('@') && email.includes('.')) {
                messageDiv.textContent = "Thank you! We'll be in touch when we launch.";
                messageDiv.style.color = "#DAC3B0"; // Dark gold
                document.getElementById('emailInput').value = ""; // Clear input
                
                // Optional: Here you would integrate with an API endpoint (e.g., Mailchimp)
                // Example: sendDataToBackend(email);
            } else {
                messageDiv.textContent = "Please enter a valid email address.";
                messageDiv.style.color = "#DAC3B0";
            }

            // Fade out message after 5 seconds
            setTimeout(() => {
                messageDiv.textContent = "";
            }, 5000);
        });
    </script>

</body>
</html>
